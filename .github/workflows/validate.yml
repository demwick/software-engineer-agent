name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq and shellcheck
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate JSON manifests
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('hooks/hooks.json'))"

      - name: Bash syntax check
        run: |
          for f in hooks/session-start hooks/auto-qa hooks/state-tracker hooks/run-hook.cmd scripts/detect-test.sh scripts/detect-quality.sh scripts/state-update.sh scripts/check-host-compat.sh scripts/archive-state.sh tests/run-tests.sh; do
            bash -n "$f"
            echo "ok $f"
          done

      - name: Shellcheck
        run: |
          shellcheck -s bash hooks/session-start hooks/auto-qa hooks/state-tracker scripts/detect-test.sh scripts/detect-quality.sh scripts/state-update.sh scripts/check-host-compat.sh scripts/archive-state.sh || true

      - name: Frontmatter presence
        run: |
          for f in agents/*.md skills/*/SKILL.md; do
            # Skip agents/_common.md — it's a shared include, not a standalone agent
            [ "$(basename $(dirname "$f"))/$(basename "$f")" = "agents/_common.md" ] && continue
            head -1 "$f" | grep -q '^---$' || { echo "missing frontmatter: $f"; exit 1; }
            echo "ok $f"
          done

      - name: Skill frontmatter spec compliance
        run: |
          # Validates against agentskills.io spec without requiring skills-ref:
          # - name: lowercase alnum + hyphens, max 64, matches parent dir
          # - description: non-empty, max 1024
          python3 <<'PY'
          import re, sys, os
          from pathlib import Path
          errors = []
          for skill_md in Path('skills').glob('*/SKILL.md'):
              parent = skill_md.parent.name
              with open(skill_md) as f:
                  content = f.read()
              if not content.startswith('---\n'):
                  errors.append(f'{skill_md}: missing frontmatter')
                  continue
              end = content.find('\n---\n', 4)
              if end < 0:
                  errors.append(f'{skill_md}: frontmatter not closed')
                  continue
              fm = content[4:end]
              name_m = re.search(r'^name:\s*(.+)$', fm, re.M)
              desc_m = re.search(r'^description:\s*(.+)$', fm, re.M)
              if not name_m:
                  errors.append(f'{skill_md}: missing name field')
                  continue
              if not desc_m:
                  errors.append(f'{skill_md}: missing description field')
                  continue
              name = name_m.group(1).strip()
              desc = desc_m.group(1).strip()
              if len(name) > 64:
                  errors.append(f'{skill_md}: name > 64 chars')
              if not re.match(r'^[a-z0-9]+(-[a-z0-9]+)*$', name):
                  errors.append(f'{skill_md}: name "{name}" not lowercase-alnum-hyphen')
              if name != parent:
                  errors.append(f'{skill_md}: name "{name}" != parent dir "{parent}"')
              if len(desc) > 1024:
                  errors.append(f'{skill_md}: description > 1024 chars ({len(desc)})')
              if not desc:
                  errors.append(f'{skill_md}: description empty')
              print(f'ok {skill_md} (name={name}, desc={len(desc)} chars)')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Progressive disclosure — 500-line limit
        run: |
          fail=0
          for f in skills/*/SKILL.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "FAIL: $f has $lines lines (agentskills.io recommends <500)"
              fail=1
            else
              echo "ok $f ($lines lines)"
            fi
          done
          [ "$fail" = "0" ] || exit 1

      - name: Smoke-test session-start hook
        run: |
          CLAUDE_PLUGIN_ROOT="$(pwd)" bash hooks/session-start | python3 -c "import sys, json; json.loads(sys.stdin.read())"

      - name: Run shell tests
        run: bash tests/run-tests.sh
